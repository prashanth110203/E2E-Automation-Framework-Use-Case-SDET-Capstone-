# Application URLs
qa.url=https://www.saucedemo.com
uat.url=https://www.saucedemo.com
prod.url=https://www.saucedemo.com

# Environment
environment=qa

# Browser Settings
browser=chrome
headless=false
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Screenshot Settings
screenshot.on.failure=true
screenshot.on.pass=false
screenshot.folder=screenshots

# Report Settings
extent.report.folder=reports
extent.report.name=AutomationTestReport

# Retry Settings
retry.failed.tests=true
max.retry.count=2

# Parallel Execution
thread.count=3