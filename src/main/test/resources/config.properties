# Browser Configuration
browser=chrome
headless=false

# Environment
environment=qa
base.url=https://www.saucedemo.com/

# Timeouts (in seconds)
implicit.wait=10
explicit.wait=20
page.load.timeout=30

# Extent Report Configuration
extent.report.folder=test-output/reports
extent.report.name=TestReport

# Screenshot Configuration
screenshot.folder=screenshots
take.screenshot.on.failure=true
take.screenshot.on.pass=true

# Test Data
testdata.excel.path=src/test/resources/testdata/LoginTestData.xlsx

# Logging
log.level=INFO